<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmá tu cuenta — PMVM</title>
</head>
<body style="margin:0;padding:0;background-color:#0a0a0a;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">

  <!-- Wrapper -->
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0a0a0a;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;">

          <!-- Header / Logo -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td style="background-color:#ffd11e;width:48px;height:48px;border-radius:12px;text-align:center;vertical-align:middle;">
                    <span style="font-size:24px;font-weight:900;color:#0a0a0a;letter-spacing:-1px;">P</span>
                  </td>
                  <td style="padding-left:12px;vertical-align:middle;">
                    <span style="font-size:22px;font-weight:900;color:#ffffff;letter-spacing:4px;">PMVM</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background-color:#141414;border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:48px 40px;">

              <!-- Icon -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding-bottom:24px;">
                    <div style="display:inline-block;background-color:rgba(255,209,30,0.1);border-radius:50%;width:64px;height:64px;text-align:center;line-height:64px;font-size:32px;">
                      ✉️
                    </div>
                  </td>
                </tr>
              </table>

              <!-- Title -->
              <h1 style="margin:0 0 12px;font-size:28px;font-weight:900;color:#ffffff;text-align:center;letter-spacing:1px;">
                Confirmá tu cuenta
              </h1>

              <!-- Subtitle -->
              <p style="margin:0 0 32px;font-size:15px;color:rgba(255,255,255,0.55);text-align:center;line-height:1.6;">
                Ya casi estás. Hacé click en el botón de abajo para activar tu cuenta y acceder a tu área personal.
              </p>

              <!-- CTA Button -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding-bottom:32px;">
                    <a href="{{ .ConfirmationURL }}"
                       style="display:inline-block;background-color:#ffd11e;color:#0a0a0a;font-size:14px;font-weight:800;letter-spacing:2px;text-transform:uppercase;text-decoration:none;padding:16px 40px;border-radius:10px;">
                      Confirmar mi cuenta
                    </a>
                  </td>
                </tr>
              </table>

              <!-- Divider -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="border-top:1px solid rgba(255,255,255,0.07);padding-top:28px;">
                    <p style="margin:0;font-size:12px;color:rgba(255,255,255,0.3);text-align:center;line-height:1.7;">
                      Si no creaste una cuenta en PMVM, podés ignorar este email.<br/>
                      El link expira en 24 horas.
                    </p>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:28px;">
              <p style="margin:0;font-size:12px;color:rgba(255,255,255,0.2);">
                © 2025 PMVM · Pesar Menos Vivir Más
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
